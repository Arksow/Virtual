<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Memory Sequence</title></head><body><main><section id="join" class="screen"><p class="eyebrow">Team word decoder</p><h1>MEMORY<br><span>SEQUENCE</span></h1><p class="intro">One player decodes. The rest count their colour flashes.</p><button id="create">CREATE ROOM</button><p class="divider">OR JOIN</p><input id="code" placeholder="ROOM CODE"><button id="join-room" class="outline">JOIN ROOM</button><p id="join-error" class="error"></p></section><section id="game" class="screen hidden"><header><p class="eyebrow" id="room-code">ROOM</p><strong id="timer">00:00</strong></header><div id="roster" class="roster"></div><div id="role-card" class="role-card"></div><div id="decoder-picker" class="letter-picker hidden"></div><div id="position-picker" class="position-picker hidden"></div><section id="observer" class="hidden"><p class="status">COUNT YOUR FLASHES</p><div id="lamp" class="lamp"></div><p id="count-readout" class="count-readout"></p></section><section id="decoder" class="hidden"><p id="status" class="status"></p><div class="code-card" id="code-card"></div><input id="guess" class="guess" placeholder="TYPE THE WORD"><button id="submit">DECODE WORD</button></section><div id="host-actions"><button id="start">START ROUND</button></div><section id="victory" class="hidden"><p class="eyebrow">Team victory</p><h2>WORD DECODED</h2><strong id="victory-time"></strong><p>Great listening. Great teamwork.</p></section><p class="tip">Counters choose a number. Decoder compares flash counts to the A–Z key.</p></section></main><script type="module" src="/src/main.js"></script><script type="module" src="/src/controls.js"></script></body></html>
