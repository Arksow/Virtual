<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memory Sequence</title><link rel="stylesheet" href="src/styles.css"></head><body><main><section id="roles" class="screen"><p class="eyebrow">MEMORY SEQUENCE</p><h1>CHOOSE<br><span>YOUR ROLE</span></h1><div class="position-picker"><button data-r="decoder" class="position selected">DECODER</button><button data-r="green" class="position">GREEN</button><button data-r="blue" class="position">BLUE</button><button data-r="pink" class="position">PINK</button><button data-r="orange" class="position">ORANGE</button></div><button id="start">START</button></section><section id="game" class="screen hidden"><header><p class="eyebrow">MEMORY SEQUENCE</p><strong id="role"></strong></header><div id="card" class="role-card"></div><div id="choices" class="letter-picker"></div><section id="view"></section></section></main><script>const $=s=>document.querySelector(s),L='ABCDEFGHIJKLMNOPQRSTUVWXYZ',W='ADRENALIN',C={green:'#69cf65',blue:'#2285df',pink:'#f73489',orange:'#ff8b25'},code=i=>[((i*2)%5)+1,((i*3+1)%5)+1,((i*4+2)%5)+1,((i*5+3)%5)+1];let r='decoder',k=0;document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{r=b.dataset.r;document.querySelectorAll('[data-r]').forEach(x=>x.classList.toggle('selected',x==b))});$('#start').onclick=()=>{$('#roles').classList.add('hidden');$('#game').classList.remove('hidden');draw()};function draw(){let d=r==='decoder';$('#role').textContent=d?'DECODER':r.toUpperCase();$('#card').innerHTML=d?'<b>_ _ _ _ _ _ _ _ _</b><span>Decode the word.</span>':`<b>YOUR COLOUR: ${r.toUpperCase()}</b><span>Choose a number and count.</span>`;if(d){$('#choices').innerHTML=[...L].map((x,i)=>`<button class="letter ${i==k?'selected':''}" data-k=${i}>${x}</button>`).join('');let c=code(k);$('#view').innerHTML=`<div class="code-card"><strong>${L[k]}</strong><span>GREEN ${c[0]} · BLUE ${c[1]} · PINK ${c[2]} · ORANGE ${c[3]}</span></div><input id="guess" class="guess" placeholder="TYPE THE WORD"><button id="decode">DECODE WORD</button><p id="result"></p>`}else{$('#choices').innerHTML=[...W].map((_,i)=>`<button class="position" data-n=${i}>${i+1}</button>`).join('');$('#view').innerHTML='<div id="lamp" class="lamp"></div>';$('#lamp').style.setProperty('--colour',C[r])}}$('#choices').onclick=e=>{let b=e.target.closest('button');if(!b)return;if(r==='decoder'){k=+b.dataset.k;draw()}else flash(code(L.indexOf(W[+b.dataset.n]))[['green','blue','pink','orange'].indexOf(r)])};async function flash(n){for(let i=0;i<n;i++){$('#lamp').classList.add('flash');await new Promise(r=>setTimeout(r,300));$('#lamp').classList.remove('flash');await new Promise(r=>setTimeout(r,240))}}document.body.onclick=e=>{if(e.target.id==='decode')$('#result').textContent=$('#guess').value.toUpperCase()==W?'WORD DECODED!':'TRY AGAIN'}</script></body></html>
