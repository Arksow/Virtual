<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memory Sequence</title><style>body{margin:0;background:#061533;color:white;font-family:Arial;padding:24px}main{max-width:480px;margin:auto}button,input{width:100%;margin:6px 0;padding:15px;border-radius:10px;border:0;font-weight:bold}.hide{display:none}.lamp{width:170px;height:170px;margin:30px auto;border-radius:50%;background:#102755;border:6px solid var(--c)}.flash{background:var(--c)!important;box-shadow:0 0 50px var(--c)}.numbers{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.numbers button{width:auto}.key{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.key button{width:auto;padding:8px;font-size:11px}h1{font-size:48px}</style></head><body><main><section id="roles"><p>MEMORY SEQUENCE</p><h1>CHOOSE ROLE</h1><button data-r="decoder">DECODER</button><button data-r="green">GREEN</button><button data-r="blue">BLUE</button><button data-r="pink">PINK</button><button data-r="orange">ORANGE</button></section><section id="game" class="hide"><button id="back">CHANGE ROLE</button><h1 id="title"></h1><div id="decoder" class="hide"><p>_ _ _ _ _ _ _ _ _</p><div id="key" class="key"></div><input id="guess" placeholder="TYPE WORD"><button id="check">DECODE WORD</button><p id="answer"></p></div><div id="counter" class="hide"><p>Choose a number, then count your colour flashes.</p><div id="numbers" class="numbers"></div><div id="lamp" class="lamp"></div></div></section></main><script>const $=s=>document.querySelector(s),L='ABCDEFGHIJKLMNOPQRSTUVWXYZ',W='ADRENALIN',cols={green:'#69cf65',blue:'#2285df',pink:'#f73489',orange:'#ff8b25'},code=i=>[((i*2)%5)+1,((i*3+1)%5)+1,((i*4+2)%5)+1,((i*5+3)%5)+1];let r;document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>start(b.dataset.r));$('#back').onclick=()=>{$('#roles').classList.remove('hide');$('#game').classList.add('hide')};function start(x){r=x;$('#roles').classList.add('hide');$('#game').classList.remove('hide');let d=x==='decoder';$('#title').textContent=d?'DECODER':x.toUpperCase();$('#decoder').classList.toggle('hide',!d);$('#counter').classList.toggle('hide',d);if(d)$('#key').innerHTML=[...L].map((a,i)=>`<button>${a}<br>${code(i).join(' · ')}</button>`).join('');else{$('#numbers').innerHTML=[...W].map((_,i)=>`<button data-n=${i}>${i+1}</button>`).join('');$('#lamp').style.setProperty('--c',cols[x])}}$('#numbers').onclick=e=>{let b=e.target.closest('button');if(b)flash(code(L.indexOf(W[+b.dataset.n]))[['green','blue','pink','orange'].indexOf(r)])};async function flash(n){for(let i=0;i<n;i++){$('#lamp').classList.add('flash');await new Promise(r=>setTimeout(r,300));$('#lamp').classList.remove('flash');await new Promise(r=>setTimeout(r,240))}}$('#check').onclick=()=>$('#answer').textContent=$('#guess').value.toUpperCase()==W?'WORD DECODED!':'TRY AGAIN';</script></body></html>
