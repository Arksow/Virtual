<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Memory Sequence</title><link rel="stylesheet" href="src/styles.css"></head><body><main><section id="roles" class="screen"><p class="eyebrow">Team word decoder</p><h1>MEMORY<br><span>SEQUENCE</span></h1><p class="intro">Choose your existing game role.</p><div class="position-picker"><button data-r="decoder" class="position selected">DECODER</button><button data-r="green" class="position">GREEN</button><button data-r="blue" class="position">BLUE</button><button data-r="pink" class="position">PINK</button><button data-r="orange" class="position">ORANGE</button></div><button id="choose">START</button></section><section id="game" class="screen hidden"><header><p class="eyebrow">MEMORY SEQUENCE</p><strong id="role-name">DECODER</strong></header><div id="role-card" class="role-card"></div><div id="picker" class="letter-picker"></div><section id="content"></section></section></main><script>const $=s=>document.querySelector(s),L='ABCDEFGHIJKLMNOPQRSTUVWXYZ',W='ADRENALIN',colors={green:'#69cf65',blue:'#2285df',pink:'#f73489',orange:'#ff8b25'},code=i=>[((i*2)%5)+1,((i*3+1)%5)+1,((i*4+2)%5)+1,((i*5+3)%5)+1];let r='decoder',k=0;document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{r=b.dataset.r;document.querySelectorAll('[data-r]').forEach(x=>x.classList.toggle('selected',x===b))});$('#choose').onclick=()=>{$('#roles').classList.add('hidden');$('#game').classList.remove('hidden');draw()};function draw(){let d=r==='decoder';$('#role-name').textContent=d?'DECODER':r.toUpperCase();$('#role-card').innerHTML=d?'<b>_ _ _ _ _ _ _ _ _</b><span>Decode the nine-letter word.</span>':`<b>YOUR COLOUR: ${r.toUpperCase()}</b><span>Choose a number and count your flashes.</span>`;if(d){$('#picker').innerHTML=[...L].map((l,i)=>`<button class="letter ${i===k?'selected':''}" data-k="${i}">${l}</button>`).join('');let c=code(k);$('#content').innerHTML=`<p class="status">GREEN ${c[0]} · BLUE ${c[1]} · PINK ${c[2]} · ORANGE ${c[3]}</p><input id="guess" class="guess" placeholder="TYPE THE WORD"><button id="decode">DECODE WORD</button><p id="answer"></p>`}else{$('#picker').innerHTML=[...W].map((_,i)=>`<button class="position" data-n="${i}">${i+1}</button>`).join('');$('#content').innerHTML='<div id="lamp" class="lamp"></div>';$('#lamp').style.setProperty('--colour',colors[r])}}$('#picker').onclick=e=>{let b=e.target.closest('button');if(!b)return;if(r==='decoder'){k=+b.dataset.k;draw()}else flash(code(L.indexOf(W[+b.dataset.n]))[['green','blue','pink','orange'].indexOf(r)])};async function flash(n){let x=$('#lamp');for(let i=0;i<n;i++){x.classList.add('flash');await new Promise(r=>setTimeout(r,300));x.classList.remove('flash');await new Promise(r=>setTimeout(r,240))}}document.body.onclick=e=>{if(e.target.id==='decode')$('#answer').textContent=$('#guess').value.trim().toUpperCase()===W?'WORD DECODED!':'TRY AGAIN'}</script></body></html>
