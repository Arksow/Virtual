<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Memory Sequence</title><link rel="stylesheet" href="src/styles.css"></head><body><main><section id="roles" class="screen"><p class="eyebrow">Team word decoder</p><h1>MEMORY<br><span>SEQUENCE</span></h1><p class="intro">Choose your existing game role.</p><div class="position-picker"><button data-r="decoder" class="position selected">DECODER</button><button data-r="green" class="position">GREEN</button><button data-r="blue" class="position">BLUE</button><button data-r="pink" class="position">PINK</button><button data-r="orange" class="position">ORANGE</button></div><button id="choose">START</button></section><section id="game" class="screen hidden"><header><p class="eyebrow">MEMORY SEQUENCE</p><strong id="role-name">DECODER</strong></header><div id="role-card" class="role-card"></div><div id="letter-picker" class="letter-picker hidden"></div><div id="number-picker" class="position-picker hidden"></div><section id="counter" class="hidden"><p class="status">COUNT YOUR FLASHES</p><div id="lamp" class="lamp"></div></section><section id="decoder"><p id="status" class="status hidden"></p><div id="code" class="code-card hidden"></div><input id="guess" class="guess hidden" placeholder="TYPE THE WORD"><button id="decode" class="hidden">DECODE WORD</button></section><div id="host-actions"><button id="start">START ROUND</button></div></section></main><script type="module" src="src/offline-game.js"></script></body></html>
